name: Update Profile README

on:
  schedule:
    # Runs every day at 00:00 UTC (5:30 AM IST)
    - cron: "0 0 * * *"
  workflow_dispatch: {}   # lets you trigger it manually from the Actions tab
  push:
    branches: [main]      # regenerate whenever you update the template/script

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout profile-generator
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Generate README
        run: node scripts/generate.js

      - name: Checkout target profile repo
        uses: actions/checkout@v4
        with:
          repository: Avnish-kaushik/Avnish-kaushik
          token: ${{ secrets.PROFILE_TOKEN }}
          path: profile-repo

      - name: Copy generated README into target repo
        run: cp output/README.md profile-repo/README.md

      - name: Commit and push if changed
        working-directory: profile-repo
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add README.md
          if git diff --cached --quiet; then
            echo "No changes to commit."
          else
            git commit -m "chore: auto-update profile README"
            git push
          fi
